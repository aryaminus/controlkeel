rules:
  # ─── SQL Injection ──────────────────────────────────────────────────────────

  - id: controlkeel.sql-injection
    message: "Semgrep detected query construction that looks vulnerable to SQL injection."
    languages: [generic]
    severity: ERROR
    pattern-regex: "(?is)(SELECT|INSERT|UPDATE|DELETE).{0,120}(\\+|<>|%\\(|format\\(|f\\\"|f').{0,120}(WHERE|FROM|INTO|SET)"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.sql_injection
      controlkeel_severity: high

  # ─── XSS / Unsafe DOM ───────────────────────────────────────────────────────

  - id: controlkeel.xss-sink
    message: "Semgrep detected an unsafe HTML sink that can introduce XSS."
    languages: [generic]
    severity: WARNING
    pattern-regex: "(?i)(innerHTML\\s*=|outerHTML\\s*=|document\\.write\\s*\\()"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.xss_sink
      controlkeel_severity: high

  - id: controlkeel.dangerously-set-inner-html
    message: "dangerouslySetInnerHTML bypasses React's XSS protection. Use sanitized output or avoid user-controlled content here."
    languages: [generic]
    severity: WARNING
    pattern-regex: "dangerouslySetInnerHTML"
    metadata:
      controlkeel_category: security
      controlkeel_decision: warn
      controlkeel_rule_id: security.semgrep.dangerous_inner_html
      controlkeel_severity: high

  - id: controlkeel.inline-script
    message: "Semgrep detected inline script content that should be reviewed before execution."
    languages: [generic]
    severity: WARNING
    pattern-regex: "(?i)<script\\b"
    metadata:
      controlkeel_category: security
      controlkeel_decision: warn
      controlkeel_rule_id: security.semgrep.inline_script
      controlkeel_severity: medium

  # ─── Hardcoded Secrets ───────────────────────────────────────────────────────

  - id: controlkeel.hardcoded-secret
    message: "Semgrep detected a likely hardcoded secret assignment."
    languages: [generic]
    severity: ERROR
    pattern-regex: "(?i)(api[_-]?key|secret|token|password)\\s*[:=]\\s*[\"'][^\"']{8,}[\"']"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.hardcoded_secret
      controlkeel_severity: high

  - id: controlkeel.jwt-hardcoded
    message: "Hardcoded JWT secret detected. Use an environment variable or secrets manager."
    languages: [generic]
    severity: ERROR
    pattern-regex: "(?i)(jwt[_-]?secret|jwt[_-]?key|signing[_-]?key)\\s*[:=]\\s*[\"'][^\"']{8,}[\"']"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.jwt_hardcoded
      controlkeel_severity: critical

  # ─── Code Execution / Injection ─────────────────────────────────────────────

  - id: controlkeel.python-eval
    message: "eval() with dynamic content can execute arbitrary code. Use ast.literal_eval() for data or avoid entirely."
    languages: [generic]
    severity: ERROR
    pattern-regex: "(?<![a-zA-Z_])eval\\s*\\([^)]{1,200}\\)"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.eval_usage
      controlkeel_severity: high

  - id: controlkeel.python-subprocess-shell
    message: "subprocess called with shell=True and user-controlled input is a command injection risk."
    languages: [generic]
    severity: ERROR
    pattern-regex: "(?i)subprocess\\.(run|call|Popen|check_output).{0,200}shell\\s*=\\s*True"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.subprocess_shell
      controlkeel_severity: high

  - id: controlkeel.python-os-system
    message: "os.system() passes the command to a shell and is vulnerable to injection. Use subprocess with a list instead."
    languages: [generic]
    severity: ERROR
    pattern-regex: "os\\.system\\s*\\("
    metadata:
      controlkeel_category: security
      controlkeel_decision: warn
      controlkeel_rule_id: security.semgrep.os_system
      controlkeel_severity: medium

  - id: controlkeel.python-pickle
    message: "pickle.loads() executes arbitrary Python on deserialization. Never unpickle untrusted data."
    languages: [generic]
    severity: ERROR
    pattern-regex: "pickle\\.loads?\\s*\\("
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.pickle_loads
      controlkeel_severity: critical

  # ─── Shell ───────────────────────────────────────────────────────────────────

  - id: controlkeel.curl-pipe-bash
    message: "Piping curl output directly into bash executes remote code without verification. Download and inspect first."
    languages: [generic]
    severity: ERROR
    pattern-regex: "curl.{0,200}\\|.{0,50}(bash|sh|zsh|fish)"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.curl_pipe_bash
      controlkeel_severity: critical

  - id: controlkeel.rm-rf
    message: "rm -rf with a variable path can delete unintended files. Verify path is scoped correctly."
    languages: [generic]
    severity: WARNING
    pattern-regex: "rm\\s+-[a-zA-Z]*r[a-zA-Z]*f|rm\\s+-[a-zA-Z]*f[a-zA-Z]*r"
    metadata:
      controlkeel_category: security
      controlkeel_decision: warn
      controlkeel_rule_id: security.semgrep.rm_rf
      controlkeel_severity: medium

  # ─── Prototype Pollution ─────────────────────────────────────────────────────

  - id: controlkeel.prototype-pollution
    message: "Assignment to __proto__ or constructor.prototype can pollute the JavaScript object prototype."
    languages: [generic]
    severity: ERROR
    pattern-regex: "(__proto__|constructor\\.prototype)\\s*\\["
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.prototype_pollution
      controlkeel_severity: high

  # ─── Debug / Production Hygiene ──────────────────────────────────────────────

  - id: controlkeel.debug-mode-enabled
    message: "Debug mode or verbose error output is enabled. This should not be deployed to production."
    languages: [generic]
    severity: WARNING
    pattern-regex: "(?i)(DEBUG\\s*=\\s*True|APP_DEBUG\\s*=\\s*true|debug:\\s*true|\"debug\":\\s*true)"
    metadata:
      controlkeel_category: hygiene
      controlkeel_decision: warn
      controlkeel_rule_id: hygiene.semgrep.debug_mode
      controlkeel_severity: medium

  - id: controlkeel.open-redirect
    message: "Redirect target derived from user input can be used for phishing. Validate against an allowlist."
    languages: [generic]
    severity: WARNING
    pattern-regex: "(?i)(redirect|location)\\s*[:=].{0,80}(params|request|query|input|user)"
    metadata:
      controlkeel_category: security
      controlkeel_decision: warn
      controlkeel_rule_id: security.semgrep.open_redirect
      controlkeel_severity: medium

  # ─── Go ──────────────────────────────────────────────────────────────────────

  - id: controlkeel.go-sql-format
    message: "Go: fmt.Sprintf used to build a SQL query string. Use parameterized queries (db.Query with ? placeholders) instead."
    languages: [go]
    severity: ERROR
    pattern: |
      fmt.Sprintf($QUERY, ...)
    pattern-filter:
      - metavariable-regex:
          metavariable: $QUERY
          regex: "(?i)(SELECT|INSERT|UPDATE|DELETE)"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.go_sql_format
      controlkeel_severity: high

  - id: controlkeel.go-hardcoded-secret
    message: "Go: hardcoded credential or API key in source. Move to environment variables or a secrets manager."
    languages: [go]
    severity: ERROR
    pattern-regex: "(?i)(apiKey|api_key|secret|password|token)\\s*:?=\\s*\"[A-Za-z0-9/+]{20,}\""
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.go_hardcoded_secret
      controlkeel_severity: critical

  - id: controlkeel.go-exec-with-user-input
    message: "Go: os/exec command built from user-controlled input risks command injection. Use exec.Command with separate arguments."
    languages: [go]
    severity: ERROR
    pattern-regex: "exec\\.Command\\s*\\(\\s*(fmt\\.Sprintf|\\+)"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.go_exec_injection
      controlkeel_severity: high

  # ─── Rust ────────────────────────────────────────────────────────────────────

  - id: controlkeel.rust-unwrap-in-handler
    message: "Rust: .unwrap() in a request handler will panic on None/Err, taking down the thread. Use ? or match instead."
    languages: [rust]
    severity: WARNING
    pattern-regex: "\\.unwrap\\(\\)"
    metadata:
      controlkeel_category: hygiene
      controlkeel_decision: warn
      controlkeel_rule_id: hygiene.semgrep.rust_unwrap_handler
      controlkeel_severity: medium

  - id: controlkeel.rust-unsafe-block
    message: "Rust: unsafe block detected. Ensure memory safety invariants are manually upheld and document why unsafe is required."
    languages: [rust]
    severity: WARNING
    pattern-regex: "\\bunsafe\\s*\\{"
    metadata:
      controlkeel_category: security
      controlkeel_decision: warn
      controlkeel_rule_id: security.semgrep.rust_unsafe_block
      controlkeel_severity: medium

  - id: controlkeel.rust-hardcoded-secret
    message: "Rust: hardcoded credential in source. Move to environment variables (std::env::var) or a secrets manager."
    languages: [rust]
    severity: ERROR
    pattern-regex: "(?i)(api_key|secret|password|token)\\s*=\\s*\"[A-Za-z0-9/+]{20,}\""
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.rust_hardcoded_secret
      controlkeel_severity: critical

  # ─── Java / Kotlin ───────────────────────────────────────────────────────────

  - id: controlkeel.java-sql-concat
    message: "Java: SQL query built with string concatenation. Use PreparedStatement with ? placeholders to prevent SQL injection."
    languages: [java]
    severity: ERROR
    pattern-regex: "(?i)(createQuery|createNativeQuery|executeQuery|prepareStatement)\\s*\\(\\s*[^)]*\\+"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.java_sql_concat
      controlkeel_severity: high

  - id: controlkeel.java-hardcoded-secret
    message: "Java: hardcoded credential or API key. Move to environment variables or a vault (e.g. AWS Secrets Manager)."
    languages: [java]
    severity: ERROR
    pattern-regex: "(?i)(apiKey|secret|password|token)\\s*=\\s*\"[A-Za-z0-9/+]{20,}\""
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.java_hardcoded_secret
      controlkeel_severity: critical

  - id: controlkeel.java-xxe
    message: "Java: XML parser may be vulnerable to XXE (XML External Entity) attacks. Disable external entity processing."
    languages: [java]
    severity: ERROR
    pattern-regex: "(?i)(DocumentBuilderFactory|SAXParserFactory|XMLInputFactory)\\.newInstance\\(\\)"
    metadata:
      controlkeel_category: security
      controlkeel_decision: warn
      controlkeel_rule_id: security.semgrep.java_xxe
      controlkeel_severity: high

  # ─── Shell / Infrastructure ────────────────────────────────────────────────

  - id: controlkeel.shell-no-set-e
    message: "Shell script missing 'set -e'. Without it, errors are silently ignored and subsequent commands run on broken state."
    languages: [bash]
    severity: WARNING
    pattern-regex: "^#!/(bin|usr/bin)/(bash|sh)(?!.*set -e)"
    metadata:
      controlkeel_category: hygiene
      controlkeel_decision: warn
      controlkeel_rule_id: hygiene.semgrep.shell_no_set_e
      controlkeel_severity: low

  - id: controlkeel.terraform-public-s3
    message: "Terraform: S3 bucket may be publicly accessible. Verify 'acl' is not set to 'public-read' or 'public-read-write' unless intentional."
    languages: [hcl]
    severity: ERROR
    pattern-regex: "(?i)acl\\s*=\\s*\"public-read"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.terraform_public_s3
      controlkeel_severity: high

  - id: controlkeel.dockerfile-root-user
    message: "Dockerfile: container runs as root. Add 'USER nonroot' before CMD/ENTRYPOINT to reduce blast radius if compromised."
    languages: [dockerfile]
    severity: WARNING
    pattern-regex: "(?i)^(CMD|ENTRYPOINT)"
    metadata:
      controlkeel_category: security
      controlkeel_decision: warn
      controlkeel_rule_id: security.semgrep.dockerfile_root_user
      controlkeel_severity: medium

  - id: controlkeel.ruby-sql-concat
    message: "Ruby: SQL query built with string interpolation or concatenation. Use parameterized queries (where('col = ?', val)) instead."
    languages: [ruby]
    severity: ERROR
    pattern-regex: "(?i)(where|find_by_sql|execute|raw)\\s*[\\(\"'].*#\\{"
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.ruby_sql_injection
      controlkeel_severity: high

  - id: controlkeel.php-eval
    message: "PHP: eval() executes arbitrary code. This is almost always exploitable if any user input reaches it."
    languages: [php]
    severity: ERROR
    pattern-regex: "\\beval\\s*\\("
    metadata:
      controlkeel_category: security
      controlkeel_decision: block
      controlkeel_rule_id: security.semgrep.php_eval
      controlkeel_severity: critical
