name: Release
run-name: Release (${{ github.ref_name }} @ ${{ github.sha }})

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare-release-candidate:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Find successful Release Smoke run for this SHA
        id: smoke_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ATTEMPTS=30
          SLEEP_SECONDS=20
          RUN_ID=""

          for attempt in $(seq 1 "$ATTEMPTS"); do
            RUNS_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release-smoke.yml/runs?branch=main&event=push&per_page=100")

            RUN_ID=$(echo "$RUNS_JSON" | jq -r --arg sha "$GITHUB_SHA" '.workflow_runs[] | select(.head_sha == $sha and .conclusion == "success") | .id' | head -n 1)
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "Found successful Release Smoke run: ${RUN_ID}"
              break
            fi

            STATUS=$(echo "$RUNS_JSON" | jq -r --arg sha "$GITHUB_SHA" '.workflow_runs[] | select(.head_sha == $sha) | .status' | head -n 1)
            CONCLUSION=$(echo "$RUNS_JSON" | jq -r --arg sha "$GITHUB_SHA" '.workflow_runs[] | select(.head_sha == $sha) | .conclusion' | head -n 1)

            if [ -n "$STATUS" ] && [ "$STATUS" != "null" ]; then
              echo "Attempt ${attempt}/${ATTEMPTS}: Release Smoke for ${GITHUB_SHA} status=${STATUS} conclusion=${CONCLUSION}"
            else
              echo "Attempt ${attempt}/${ATTEMPTS}: No Release Smoke run found yet for ${GITHUB_SHA}."
            fi

            if [ "$attempt" -lt "$ATTEMPTS" ]; then
              sleep "$SLEEP_SECONDS"
            fi
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful Release Smoke run found for ${GITHUB_SHA} on main after waiting $((ATTEMPTS * SLEEP_SECONDS)) seconds." >&2
            echo "Run Release Smoke successfully for this SHA before publishing a tag." >&2
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Download release candidate artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_NAME="release-candidate-dist-${GITHUB_SHA}"
          mkdir -p /tmp/release-candidate
          gh run download "${{ steps.smoke_run.outputs.run_id }}" -n "$ARTIFACT_NAME" -D /tmp/release-candidate
          test -f /tmp/release-candidate/controlkeel-checksums.txt
      - uses: actions/upload-artifact@v7
        with:
          name: release-candidate-dist
          path: /tmp/release-candidate
          retention-days: 1
      - uses: actions/upload-artifact@v7
        with:
          name: release-metadata
          path: /tmp/release-candidate/controlkeel-checksums.txt
          retention-days: 1

  release:
    needs: prepare-release-candidate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: release-candidate-dist
          path: dist
      - name: Render release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/render_release_notes.py "$VERSION" > /tmp/controlkeel-release-notes.md
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
            gh release edit "${TAG}" \
              --title "${TAG}" \
              --notes-file /tmp/controlkeel-release-notes.md \
              --latest
          else
            gh release create "${TAG}" dist/* \
              --verify-tag \
              --title "${TAG}" \
              --notes-file /tmp/controlkeel-release-notes.md \
              --latest
          fi

  publish-homebrew:
    needs: [prepare-release-candidate, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check Homebrew publish configuration
        id: homebrew_gate
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v8
        if: steps.homebrew_gate.outputs.enabled == 'true'
        with:
          name: release-metadata
          path: /tmp/release-metadata
      - name: Publish Homebrew formula
        if: steps.homebrew_gate.outputs.enabled == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          MAC_INTEL_SHA=$(grep ' controlkeel-macos-x86_64.tar.gz$' /tmp/release-metadata/controlkeel-checksums.txt | awk '{print $1}')
          MAC_ARM_SHA=$(grep ' controlkeel-macos-arm64.tar.gz$' /tmp/release-metadata/controlkeel-checksums.txt | awk '{print $1}')
          LINUX_SHA=$(grep ' controlkeel-linux-x86_64.tar.gz$' /tmp/release-metadata/controlkeel-checksums.txt | awk '{print $1}')

          cat > /tmp/controlkeel.rb <<EOF
          class Controlkeel < Formula
            desc "Control plane for governed AI coding"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/controlkeel-macos-arm64.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              else
                url "${BASE_URL}/controlkeel-macos-x86_64.tar.gz"
                sha256 "${MAC_INTEL_SHA}"
              end
            end

            on_linux do
              url "${BASE_URL}/controlkeel-linux-x86_64.tar.gz"
              sha256 "${LINUX_SHA}"
            end

            def install
              bin.install "controlkeel"
            end

            test do
              assert_match "ControlKeel", shell_output("#{bin}/controlkeel version")
            end
          end
          EOF

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/aryaminus/homebrew-controlkeel.git" /tmp/homebrew-controlkeel
          mkdir -p /tmp/homebrew-controlkeel/Formula
          cp /tmp/controlkeel.rb /tmp/homebrew-controlkeel/Formula/controlkeel.rb
          cd /tmp/homebrew-controlkeel
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/controlkeel.rb
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): update controlkeel ${VERSION}"
          git push

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Skip without npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi
      - name: Publish npm bootstrap package
        working-directory: packages/npm/controlkeel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            exit 0
          fi

          npm publish --access public

  publish-github-packages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@aryaminus"
      - name: Publish GitHub Packages bootstrap package
        working-directory: packages/npm/controlkeel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com
