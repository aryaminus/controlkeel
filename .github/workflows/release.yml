name: Release
run-name: Release (${{ github.ref_name }} @ ${{ github.sha }})

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=linux MIX_ENV=prod mix release
      - name: Rename binary
        run: mv burrito_out/controlkeel_linux burrito_out/controlkeel-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: controlkeel-linux
          path: burrito_out/controlkeel-linux-x86_64

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            artifact_name: controlkeel-macos-x86_64
            upload_name: controlkeel-macos-intel
            source_name: controlkeel_macos
          - target: macos_silicon
            artifact_name: controlkeel-macos-arm64
            upload_name: controlkeel-macos-silicon
            source_name: controlkeel_macos_silicon
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: brew install xz p7zip
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=${{ matrix.target }} MIX_ENV=prod mix release
      - name: Rename binary
        run: mv burrito_out/${{ matrix.source_name }} burrito_out/${{ matrix.artifact_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload_name }}
          path: burrito_out/${{ matrix.artifact_name }}

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=windows MIX_ENV=prod mix release
      - name: Rename binary
        run: mv burrito_out/controlkeel_windows.exe burrito_out/controlkeel-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: controlkeel-windows
          path: burrito_out/controlkeel-windows-x86_64.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: controlkeel-linux
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: controlkeel-macos-intel
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: controlkeel-macos-silicon
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: controlkeel-windows
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            Download the binary for your platform below. No Erlang or Elixir required.

            | Platform | Binary |
            |----------|--------|
            | macOS (Intel) | `controlkeel-macos-x86_64` |
            | macOS (Apple Silicon) | `controlkeel-macos-arm64` |
            | Linux x86_64 | `controlkeel-linux-x86_64` |
            | Windows x86_64 | `controlkeel-windows-x86_64.exe` |

            ```bash
            chmod +x controlkeel-macos-arm64
            ./controlkeel-macos-arm64
            ./controlkeel-macos-arm64 init
            ./controlkeel-macos-arm64 attach claude-code
            ```

            ## Source

            ```bash
            mix setup && mix phx.server
            ```

            See [README](README.md) for full setup and MCP integration docs.
