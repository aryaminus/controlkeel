name: Release
run-name: Release (${{ github.ref_name }} @ ${{ github.sha }})

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1.20.3
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=linux MIX_ENV=prod mix release
      - name: Rename binary
        run: mv burrito_out/controlkeel_linux burrito_out/controlkeel-linux-x86_64
      - uses: actions/upload-artifact@v7
        with:
          name: controlkeel-linux
          path: burrito_out/controlkeel-linux-x86_64

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            artifact_name: controlkeel-macos-x86_64
            upload_name: controlkeel-macos-intel
            source_name: controlkeel_macos
          - target: macos_silicon
            artifact_name: controlkeel-macos-arm64
            upload_name: controlkeel-macos-silicon
            source_name: controlkeel_macos_silicon
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1.20.3
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: |
          brew list xz >/dev/null 2>&1 || brew install xz
          brew list p7zip >/dev/null 2>&1 || brew install p7zip
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=${{ matrix.target }} MIX_ENV=prod mix release
      - name: Rename binary
        run: mv burrito_out/${{ matrix.source_name }} burrito_out/${{ matrix.artifact_name }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.upload_name }}
          path: burrito_out/${{ matrix.artifact_name }}

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1.20.3
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=windows MIX_ENV=prod mix release
      - name: Rename binary
        run: mv burrito_out/controlkeel_windows.exe burrito_out/controlkeel-windows-x86_64.exe
      - uses: actions/upload-artifact@v7
        with:
          name: controlkeel-windows
          path: burrito_out/controlkeel-windows-x86_64.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1.20.3
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - run: mix deps.get
      - uses: actions/download-artifact@v8
        with:
          name: controlkeel-linux
          path: release_stage/raw/controlkeel-linux
      - uses: actions/download-artifact@v8
        with:
          name: controlkeel-macos-intel
          path: release_stage/raw/controlkeel-macos-intel
      - uses: actions/download-artifact@v8
        with:
          name: controlkeel-macos-silicon
          path: release_stage/raw/controlkeel-macos-silicon
      - uses: actions/download-artifact@v8
        with:
          name: controlkeel-windows
          path: release_stage/raw/controlkeel-windows
      - name: Package release archives
        run: |
          mkdir -p dist release_stage/package/linux release_stage/package/macos-intel release_stage/package/macos-arm release_stage/package/windows

          cp release_stage/raw/controlkeel-linux/controlkeel-linux-x86_64 dist/controlkeel-linux-x86_64
          cp release_stage/raw/controlkeel-linux/controlkeel-linux-x86_64 release_stage/package/linux/controlkeel
          tar -C release_stage/package/linux -czf dist/controlkeel-linux-x86_64.tar.gz controlkeel

          cp release_stage/raw/controlkeel-macos-intel/controlkeel-macos-x86_64 dist/controlkeel-macos-x86_64
          cp release_stage/raw/controlkeel-macos-intel/controlkeel-macos-x86_64 release_stage/package/macos-intel/controlkeel
          tar -C release_stage/package/macos-intel -czf dist/controlkeel-macos-x86_64.tar.gz controlkeel

          cp release_stage/raw/controlkeel-macos-silicon/controlkeel-macos-arm64 dist/controlkeel-macos-arm64
          cp release_stage/raw/controlkeel-macos-silicon/controlkeel-macos-arm64 release_stage/package/macos-arm/controlkeel
          tar -C release_stage/package/macos-arm -czf dist/controlkeel-macos-arm64.tar.gz controlkeel

          cp release_stage/raw/controlkeel-windows/controlkeel-windows-x86_64.exe dist/controlkeel-windows-x86_64.exe
          cp release_stage/raw/controlkeel-windows/controlkeel-windows-x86_64.exe release_stage/package/windows/controlkeel.exe
          (cd release_stage/package/windows && zip -q ../../../dist/controlkeel-windows-x86_64.zip controlkeel.exe)
      - name: Export publishable bundle targets
        run: mix run scripts/export_release_bundles.exs
      - name: Archive bundle targets
        run: |
          find controlkeel/dist -mindepth 1 -maxdepth 1 -type d | while read -r target_dir; do
            target=$(basename "$target_dir")
            tar -C controlkeel/dist -czf "dist/controlkeel-${target}.tar.gz" "$target"
          done
      - name: Copy installer assets
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1
      - name: Generate checksums
        run: |
          find dist -maxdepth 1 -type f ! -name 'controlkeel-checksums.txt' -print0 | sort -z | xargs -0 sha256sum > dist/controlkeel-checksums.txt
      - name: Render release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/render_release_notes.py "$VERSION" > /tmp/controlkeel-release-notes.md
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: /tmp/controlkeel-release-notes.md

  publish-homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Skip without Homebrew token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew publish."
            exit 0
          fi
      - name: Publish Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            exit 0
          fi

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          curl -fsSL "${BASE_URL}/controlkeel-checksums.txt" -o /tmp/controlkeel-checksums.txt

          MAC_INTEL_SHA=$(grep ' controlkeel-macos-x86_64.tar.gz$' /tmp/controlkeel-checksums.txt | awk '{print $1}')
          MAC_ARM_SHA=$(grep ' controlkeel-macos-arm64.tar.gz$' /tmp/controlkeel-checksums.txt | awk '{print $1}')
          LINUX_SHA=$(grep ' controlkeel-linux-x86_64.tar.gz$' /tmp/controlkeel-checksums.txt | awk '{print $1}')

          cat > /tmp/controlkeel.rb <<EOF
          class Controlkeel < Formula
            desc "Control plane for governed AI coding"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/controlkeel-macos-arm64.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              else
                url "${BASE_URL}/controlkeel-macos-x86_64.tar.gz"
                sha256 "${MAC_INTEL_SHA}"
              end
            end

            on_linux do
              url "${BASE_URL}/controlkeel-linux-x86_64.tar.gz"
              sha256 "${LINUX_SHA}"
            end

            def install
              bin.install "controlkeel"
            end

            test do
              assert_match "ControlKeel", shell_output("#{bin}/controlkeel version")
            end
          end
          EOF

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/aryaminus/homebrew-controlkeel.git" /tmp/homebrew-controlkeel
          mkdir -p /tmp/homebrew-controlkeel/Formula
          cp /tmp/controlkeel.rb /tmp/homebrew-controlkeel/Formula/controlkeel.rb
          cd /tmp/homebrew-controlkeel
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/controlkeel.rb
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): update controlkeel ${VERSION}"
          git push

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Skip without npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi
      - name: Publish npm bootstrap package
        working-directory: packages/npm/controlkeel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            exit 0
          fi

          npm publish --access public
