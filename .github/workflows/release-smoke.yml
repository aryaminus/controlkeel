name: Release Smoke

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4"
      - uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"
      - run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=linux MIX_ENV=prod mix release
      - run: chmod +x scripts/release_smoke.sh
      - run: scripts/release_smoke.sh "$(find burrito_out -maxdepth 1 -type f | head -n 1)"

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4"
      - uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"
      - run: brew install xz p7zip
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=macos MIX_ENV=prod mix release
      - run: chmod +x scripts/release_smoke.sh
      - run: scripts/release_smoke.sh "$(find burrito_out -maxdepth 1 -type f | head -n 1)"

  windows-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4"
      - uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"
      - run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=windows MIX_ENV=prod mix release
      - uses: actions/upload-artifact@v4
        with:
          name: controlkeel-windows
          path: burrito_out/**

  windows-smoke:
    runs-on: windows-latest
    needs: windows-build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: controlkeel-windows
          path: burrito_out
      - name: Smoke test binary
        shell: pwsh
        run: |
          $binary = Get-ChildItem burrito_out -Recurse -File | Where-Object { $_.Extension -eq ".exe" } | Select-Object -First 1
          if (-not $binary) { throw "No Windows binary found in burrito_out" }
          & $binary.FullName help | Out-Null
          & $binary.FullName version | Out-Null
          $tmp = Join-Path $env:TEMP "controlkeel-release-smoke-$([guid]::NewGuid())"
          New-Item -ItemType Directory -Path $tmp | Out-Null
          Push-Location $tmp
          try {
            & $binary.FullName init | Out-Null
            if (-not (Test-Path "controlkeel/project.json")) { throw "project binding missing" }
            if (-not (Test-Path "controlkeel/bin/controlkeel-mcp.cmd")) { throw "mcp wrapper missing" }
          } finally {
            Pop-Location
            Remove-Item -Recurse -Force $tmp
          }
