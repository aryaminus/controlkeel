name: Release Smoke
run-name: Release Smoke (${{ github.ref_name }} @ ${{ github.sha }})

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux:
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): bump version to ') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1.23.0
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-release-smoke-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-release-smoke-
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=linux MIX_ENV=prod mix release
      - run: chmod +x scripts/release_smoke.sh
      - run: scripts/release_smoke.sh "burrito_out/controlkeel_linux"

  macos:
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): bump version to ') }}"
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            artifact_name: controlkeel-macos-intel
            source_name: controlkeel_macos
          - target: macos_silicon
            artifact_name: controlkeel-macos-arm64
            source_name: controlkeel_macos_silicon
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1.23.0
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-release-smoke-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-release-smoke-
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: |
          brew list xz >/dev/null 2>&1 || brew install xz
          brew list p7zip >/dev/null 2>&1 || brew install p7zip
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=${{ matrix.target }} MIX_ENV=prod mix release
      - run: chmod +x scripts/release_smoke.sh
      - run: scripts/release_smoke.sh "burrito_out/${{ matrix.source_name }}"

  windows-build:
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): bump version to ') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1.23.0
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3.4.3"
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-release-smoke-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-release-smoke-
      - name: Install Zig 0.15.2
        run: |
          chmod +x scripts/install_zig.sh
          scripts/install_zig.sh 0.15.2 >/dev/null
          echo "/usr/local/zig" >> $GITHUB_PATH
      - run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full
      - run: mix deps.get
      - run: MIX_ENV=prod mix assets.deploy
      - run: BURRITO_TARGET=windows MIX_ENV=prod mix release
      - run: mv burrito_out/controlkeel_windows.exe burrito_out/controlkeel-windows-x86_64.exe
      - uses: actions/upload-artifact@v7
        with:
          name: controlkeel-windows
          path: burrito_out/controlkeel-windows-x86_64.exe

  windows-smoke:
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): bump version to ') }}"
    runs-on: windows-latest
    needs: windows-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: controlkeel-windows
          path: burrito_out
      - name: Smoke test binary
        timeout-minutes: 10
        shell: pwsh
        run: |
          ./scripts/release_smoke.ps1 -BinaryPath (Resolve-Path "burrito_out/controlkeel-windows-x86_64.exe")
